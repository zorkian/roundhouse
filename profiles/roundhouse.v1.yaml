version: 1
runtime:
  image: roundhouse/runner:dev
  workspace: /workspace
bootstrap:
  command: pnpm
  args: [install, --frozen-lockfile]
validation:
  format:
    command: pnpm
    args: [format:check]
  compile:
    command: pnpm
    args: [typecheck]
  targeted:
    command: pnpm
    args: [test]
  quick:
    format:
      command: pnpm
      args: [exec, prettier, --check]
      include:
        - "**/*.cjs"
        - "**/*.js"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.md"
        - "**/*.mjs"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.yaml"
        - "**/*.yml"
    fullWhenChanged:
      - .github/workflows/**
      - containers/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - profiles/**
      - tsconfig*.json
      - "**/package.json"
      - "**/tsconfig.json"
  timeoutMinutes: 15
network:
  default: deny
  capabilities: []
protectedPaths:
  - .github/workflows/**
  - containers/**
artifacts:
  include:
    - .roundhouse/artifacts/**
