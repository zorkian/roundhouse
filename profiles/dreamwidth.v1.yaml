version: 1
runtime:
  image: ghcr.io/dreamwidth/devcontainer@sha256:19365e4d012402b280b20a18187f882feac676c40c2163de6f8ebb92e54cebcd
  workspace: /workspaces/dreamwidth
bootstrap:
  command: /bin/bash
  args:
    - -lc
    - >-
      mkdir -p "$LJHOME/ext/local" "$LJHOME/build" &&
      ln -ns "$LJHOME/.devcontainer/config/etc/dw-etc" "$LJHOME/ext/local/etc" 2>/dev/null || true;
      ln -snf /opt/dreamwidth-static "$LJHOME/build/static" &&
      service mysql start &&
      t/bin/initialize-db
validation:
  format:
    command: perl
    args:
      - /opt/dreamwidth-extlib/bin/tidyall
      - --check-only
      - --all
      - --jobs
      - "10"
  compile:
    command: prove
    args: [-v, t/00-compile.t]
  targeted:
    command: /bin/bash
    args:
      - -lc
      - >-
        prove t/request-*.t t/plack-*.t t/cleaner-*.t t/routing-*.t t/rate-limit.t
        t/auth-*.t t/post.t t/proto-post-edit-roundtrip.t t/entry-lookup.t t/draftset.t
        t/comment-create.t t/entrycomment-create.t t/talkpost-*.t t/privs.t t/caps.t
        t/media-security.t t/captcha-request.t t/settings.t
  timeoutMinutes: 15
network:
  default: deny
  capabilities:
    - github-read
    - ghcr-read
protectedPaths:
  - .devcontainer/**
  - .github/workflows/**
  - bin/upgrading/**
  - doc/dependencies-*
  - etc/**
artifacts:
  include:
    - .roundhouse/artifacts/**
    - logs/**
