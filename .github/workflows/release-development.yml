name: Release development

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: roundhouse-development-release
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy immutable release to development
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: roundhouse-development
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out exact merged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.4.1

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install and verify
        run: |
          pnpm install --frozen-lockfile
          pnpm check
          pnpm build

      - name: Build and push one commit-tagged Container image
        id: image
        run: |
          set -euo pipefail
          tag="roundhouse-release:${GITHUB_SHA}"
          docker build \
            --platform linux/amd64 \
            --build-arg "ROUNDHOUSE_RELEASE_COMMIT=${GITHUB_SHA}" \
            --tag "$tag" \
            --file containers/roundhouse-execution/Dockerfile \
            .
          push_output="$(pnpm exec wrangler containers push "$tag" 2>&1 | tee /dev/stderr)"
          digest="$(printf '%s\n' "$push_output" | sed -nE 's/.*(sha256:[a-f0-9]{64}).*/\1/p' | tail -1)"
          test -n "$digest"
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
          printf 'reference=registry.cloudflare.com/%s/roundhouse-release:%s@%s\n' "$CLOUDFLARE_ACCOUNT_ID" "$GITHUB_SHA" "$digest" >> "$GITHUB_OUTPUT"

      - name: Render exact development configuration
        run: |
          mkdir -p .roundhouse/release
          node scripts/release/render-wrangler-config.mjs \
            development \
            "${{ vars.CLOUDFLARE_D1_DATABASE_ID }}" \
            "${{ vars.CLOUDFLARE_ACCESS_AUD }}" \
            "${{ steps.image.outputs.reference }}" \
            .roundhouse/release/wrangler.development.json

      - name: Bundle once and record release manifest
        run: |
          pnpm exec esbuild apps/control-plane-worker/src/deploy.ts \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --external:cloudflare:workers \
            --outfile=.roundhouse/release/worker.mjs
          pnpm exec wrangler deploy .roundhouse/release/worker.mjs \
            --no-bundle \
            --dry-run \
            --containers-rollout none \
            --config .roundhouse/release/wrangler.development.json
          node scripts/release/roundhouse-release.mjs manifest \
            .roundhouse/release/worker.mjs \
            "${{ steps.image.outputs.digest }}" \
            .roundhouse/release/manifest.json

      - name: Apply exact additive development migrations
        run: |
          pnpm exec wrangler d1 migrations apply DB \
            --remote \
            --config .roundhouse/release/wrangler.development.json

      - name: Deploy the exact Worker bundle and bindings
        id: worker
        run: |
          set -euo pipefail
          pnpm exec wrangler deploy .roundhouse/release/worker.mjs \
            --no-bundle \
            --config .roundhouse/release/wrangler.development.json \
            --tag "release-${GITHUB_SHA}" \
            --message "Roundhouse development ${GITHUB_SHA}" \
            --containers-rollout gradual
          pnpm exec wrangler versions list \
            --name roundhouse-dev-control-plane \
            --json > .roundhouse/release/development-versions.json
          version_id="$(jq -r 'last.id' .roundhouse/release/development-versions.json)"
          test "$version_id" != null
          printf 'version_id=%s\n' "$version_id" >> "$GITHUB_OUTPUT"

      - name: Smoke-test development
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          canary_status="$(curl \
            --silent \
            --show-error \
            --retry 60 \
            --retry-all-errors \
            --retry-delay 10 \
            --retry-max-time 900 \
            --max-time 120 \
            --request POST \
            --header "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            --header "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            --output .roundhouse/release/development-canary.json \
            --write-out '%{http_code}' \
            "https://roundhouse-dev.rm-rf.rip/v1/releases/${GITHUB_SHA}/canary")"
          if test "$canary_status" != 200; then
            echo "::error::Development Container canary returned HTTP ${canary_status} after waiting for the gradual rollout"
            jq . .roundhouse/release/development-canary.json >&2 || true
            exit 1
          fi
          jq --exit-status \
            --arg commit "$GITHUB_SHA" \
            '.schemaVersion == 1 and .ok == true and .releaseCommit == $commit and .environment == "development" and .workerId == "roundhouse-dev-control-plane"' \
            .roundhouse/release/development-canary.json > /dev/null
          fleet_deadline=$((SECONDS + 1200))
          while true; do
            pnpm exec wrangler containers list --json \
              > .roundhouse/release/development-fleet-all.json
            if jq --exit-status \
              --arg name roundhouse-dev-execution \
              --arg commit "$GITHUB_SHA" \
              '.[] | select(.name == $name) | .state == "ready" and (.image | contains($commit))' \
              .roundhouse/release/development-fleet-all.json > /dev/null; then
              jq --arg name roundhouse-dev-execution \
                '.[] | select(.name == $name)' \
                .roundhouse/release/development-fleet-all.json \
                > .roundhouse/release/development-fleet.json
              break
            fi
            if (( SECONDS >= fleet_deadline )); then
              echo "::error::Development Container fleet did not converge on ${GITHUB_SHA} within 20 minutes"
              jq . .roundhouse/release/development-fleet-all.json >&2
              exit 1
            fi
            sleep 15
          done
          ready_status="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 8 \
            --retry-all-errors \
            --retry-delay 3 \
            --header "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            --header "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            --output .roundhouse/release/development-ready.json \
            --write-out '%{http_code}' \
            https://roundhouse-dev.rm-rf.rip/ready)"
          test "$ready_status" = 200
          jq --exit-status \
            '.schemaVersion == 1 and .ready == true' \
            .roundhouse/release/development-ready.json > /dev/null
          status="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 8 \
            --retry-all-errors \
            --retry-delay 3 \
            --header "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            --header "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            --output .roundhouse/release/development-health.json \
            --write-out '%{http_code}' \
            https://roundhouse-dev.rm-rf.rip/health)"
          test "$status" = 200
          jq --exit-status \
            'type == "object" and keys == ["ok", "schemaVersion"] and .schemaVersion == 1 and .ok == true' \
            .roundhouse/release/development-health.json > /dev/null
          jq -n \
            --arg origin https://roundhouse-dev.rm-rf.rip \
            --arg checked_at "$(date --utc +%Y-%m-%dT%H:%M:%S.000Z)" \
            --slurpfile canary .roundhouse/release/development-canary.json \
            --slurpfile fleet .roundhouse/release/development-fleet.json \
            --slurpfile ready .roundhouse/release/development-ready.json \
            --slurpfile health .roundhouse/release/development-health.json \
            '{schemaVersion:1,origin:$origin,canary:$canary[0],fleet:$fleet[0],ready:$ready[0],health:$health[0],checkedAt:$checked_at}' \
            > .roundhouse/release/development-smoke.json
          node scripts/release/roundhouse-release.mjs evidence \
            development \
            .roundhouse/release/manifest.json \
            roundhouse-dev-control-plane \
            "${{ steps.worker.outputs.version_id }}" \
            roundhouse-dev-execution \
            .roundhouse/release/development-smoke.json \
            "github:${GITHUB_ACTOR}" \
            .roundhouse/release/development-evidence.json

      - name: Retain immutable development release evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: roundhouse-development-${{ github.sha }}
          path: |
            .roundhouse/release/manifest.json
            .roundhouse/release/worker.mjs
            .roundhouse/release/development-canary.json
            .roundhouse/release/development-fleet.json
            .roundhouse/release/development-ready.json
            .roundhouse/release/development-smoke.json
            .roundhouse/release/development-evidence.json
          if-no-files-found: error
          retention-days: 90
