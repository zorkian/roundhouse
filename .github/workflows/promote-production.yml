name: Promote production

run-name: >-
  Promote production from development ${{
    github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.development_run_id
  }}

on:
  workflow_run:
    workflows: [Release development]
    types: [completed]
  workflow_dispatch:
    inputs:
      development_run_id:
        description: Successful Release development workflow run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: roundhouse-production-promotion
  cancel-in-progress: false

jobs:
  promote:
    name: Promote accepted development bytes to production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: roundhouse-production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      DEVELOPMENT_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.development_run_id }}
      EXPECTED_SOURCE_COMMIT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}

    steps:
      - name: Download exact development evidence
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          run-id: ${{ env.DEVELOPMENT_RUN_ID }}
          github-token: ${{ github.token }}
          path: .roundhouse/release
          merge-multiple: true

      - name: Read accepted source identity
        id: release
        run: |
          set -euo pipefail
          source_commit="$(jq -r .sourceCommit .roundhouse/release/manifest.json)"
          digest="$(jq -r .container.digest .roundhouse/release/manifest.json)"
          test "${#source_commit}" -eq 40
          if test -n "$EXPECTED_SOURCE_COMMIT"; then
            test "$source_commit" = "$EXPECTED_SOURCE_COMMIT"
          fi
          printf 'source_commit=%s\n' "$source_commit" >> "$GITHUB_OUTPUT"
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"

      - name: Check out exact accepted source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.source_commit }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.4.1

      - name: Enable pnpm and build release verifier
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          pnpm install --frozen-lockfile
          pnpm build

      - name: Restore downloaded immutable artifacts after checkout
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          run-id: ${{ env.DEVELOPMENT_RUN_ID }}
          github-token: ${{ github.token }}
          path: .roundhouse/release
          merge-multiple: true

      - name: Read the production environment approver
        id: environment-approval
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          approvals="$(gh api \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/approvals")"
          actor="$(jq -r \
            '[.[] | select(.state == "approved") | select(any(.environments[]?; .name == "roundhouse-production"))] | last | .user.login // empty' \
            <<<"$approvals")"
          test -n "$actor"
          printf 'actor=%s\n' "$actor" >> "$GITHUB_OUTPUT"

      - name: Record exact human promotion approval
        run: |
          node scripts/release/roundhouse-release.mjs approval \
            .roundhouse/release/manifest.json \
            .roundhouse/release/development-evidence.json \
            "github:${{ steps.environment-approval.outputs.actor }}" \
            .roundhouse/release/promotion-approval.json
          node scripts/release/roundhouse-release.mjs verify-promotion \
            .roundhouse/release/manifest.json \
            .roundhouse/release/development-evidence.json \
            .roundhouse/release/promotion-approval.json

      - name: Render exact production configuration
        run: |
          node scripts/release/render-wrangler-config.mjs \
            production \
            "${{ vars.CLOUDFLARE_D1_DATABASE_ID }}" \
            "${{ vars.CLOUDFLARE_ACCESS_AUD }}" \
            "registry.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}/roundhouse-release:${{ steps.release.outputs.source_commit }}@${{ steps.release.outputs.digest }}" \
            .roundhouse/release/wrangler.production.json
          test "$(sha256sum .roundhouse/release/worker.mjs | cut -d' ' -f1)" = \
            "$(jq -r .worker.bundleSha256 .roundhouse/release/manifest.json)"

      - name: Apply the exact additive production migrations
        run: |
          pnpm exec wrangler d1 migrations apply DB \
            --remote \
            --config .roundhouse/release/wrangler.production.json

      - name: Deploy the accepted Worker bundle and production bindings
        id: worker
        run: |
          set -euo pipefail
          source_commit="${{ steps.release.outputs.source_commit }}"
          pnpm exec wrangler deploy .roundhouse/release/worker.mjs \
            --no-bundle \
            --config .roundhouse/release/wrangler.production.json \
            --tag "release-${source_commit}" \
            --message "Roundhouse production ${source_commit}" \
            --containers-rollout immediate
          pnpm exec wrangler versions list \
            --name roundhouse-prod-control-plane \
            --json > .roundhouse/release/production-versions.json
          version_id="$(jq -r 'last.id' .roundhouse/release/production-versions.json)"
          test "$version_id" != null
          printf 'version_id=%s\n' "$version_id" >> "$GITHUB_OUTPUT"

      - name: Smoke-test production and record evidence
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          source_commit="${{ steps.release.outputs.source_commit }}"
          canary_status="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 60 \
            --retry-all-errors \
            --retry-delay 10 \
            --retry-max-time 900 \
            --max-time 120 \
            --request POST \
            --header "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            --header "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            --output .roundhouse/release/production-canary.json \
            --write-out '%{http_code}' \
            "https://roundhouse.rm-rf.rip/v1/releases/${source_commit}/canary")"
          if test "$canary_status" != 200; then
            echo "::error::Production Container canary returned HTTP ${canary_status} while waiting for the new image"
            jq . .roundhouse/release/production-canary.json >&2 || true
            exit 1
          fi
          jq --exit-status \
            --arg commit "$source_commit" \
            '.schemaVersion == 1 and .ok == true and .releaseCommit == $commit and .environment == "production" and .workerId == "roundhouse-prod-control-plane"' \
            .roundhouse/release/production-canary.json > /dev/null
          ready_status="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 8 \
            --retry-all-errors \
            --retry-delay 3 \
            --header "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            --header "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            --output .roundhouse/release/production-ready.json \
            --write-out '%{http_code}' \
            https://roundhouse.rm-rf.rip/ready)"
          test "$ready_status" = 200
          jq --exit-status \
            '.schemaVersion == 1 and .ready == true' \
            .roundhouse/release/production-ready.json > /dev/null
          status="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 8 \
            --retry-all-errors \
            --retry-delay 3 \
            --header "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            --header "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            --output .roundhouse/release/production-health.json \
            --write-out '%{http_code}' \
            https://roundhouse.rm-rf.rip/health)"
          test "$status" = 200
          jq --exit-status \
            'type == "object" and keys == ["ok", "schemaVersion"] and .schemaVersion == 1 and .ok == true' \
            .roundhouse/release/production-health.json > /dev/null
          jq -n \
            --arg origin https://roundhouse.rm-rf.rip \
            --arg checked_at "$(date --utc +%Y-%m-%dT%H:%M:%S.000Z)" \
            --slurpfile canary .roundhouse/release/production-canary.json \
            --slurpfile ready .roundhouse/release/production-ready.json \
            --slurpfile health .roundhouse/release/production-health.json \
            '{schemaVersion:1,origin:$origin,canary:$canary[0],ready:$ready[0],health:$health[0],checkedAt:$checked_at}' \
            > .roundhouse/release/production-smoke.json
          node scripts/release/roundhouse-release.mjs evidence \
            production \
            .roundhouse/release/manifest.json \
            roundhouse-prod-control-plane \
            "${{ steps.worker.outputs.version_id }}" \
            roundhouse-prod-execution \
            .roundhouse/release/production-smoke.json \
            "github:${GITHUB_ACTOR}" \
            .roundhouse/release/production-evidence.json

      - name: Retain production promotion evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: roundhouse-production-${{ steps.release.outputs.source_commit }}
          path: |
            .roundhouse/release/manifest.json
            .roundhouse/release/development-evidence.json
            .roundhouse/release/promotion-approval.json
            .roundhouse/release/production-canary.json
            .roundhouse/release/production-ready.json
            .roundhouse/release/production-smoke.json
            .roundhouse/release/production-evidence.json
          if-no-files-found: error
          retention-days: 90
